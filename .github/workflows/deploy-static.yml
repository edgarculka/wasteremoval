name: Deploy static site

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: firebase-hosting
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_WASTEREMOVAL_3276 || secrets.FIREBASE_SERVICE_ACCOUNT }}
      NUXT_PUBLIC_SITE_NAME: DBS Waste
      NUXT_PUBLIC_SITE_URL: https://dbs-waste.co.uk

    steps:
      - name: Verify Firebase credentials
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error title=Missing Firebase service account secret::Add a repository Actions secret named FIREBASE_SERVICE_ACCOUNT_WASTEREMOVAL_3276 containing the Firebase service account JSON for project wasteremoval-3276. A fallback secret named FIREBASE_SERVICE_ACCOUNT is also supported."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate static site
        run: npm run generate

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ env.FIREBASE_SERVICE_ACCOUNT }}
          projectId: wasteremoval-3276
          channelId: live
