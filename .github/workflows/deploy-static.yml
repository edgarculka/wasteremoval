name: Deploy Firebase app

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-hosting
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_WASTEREMOVAL_3276 || secrets.FIREBASE_SERVICE_ACCOUNT }}
      NUXT_PUBLIC_SITE_NAME: DBS Waste
      NUXT_PUBLIC_SITE_URL: https://dbs-waste.co.uk

    steps:
      - name: Verify Firebase credentials
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error title=Missing Firebase service account secret::Add a repository Actions secret named FIREBASE_SERVICE_ACCOUNT_WASTEREMOVAL_3276 containing the Firebase service account JSON for project wasteremoval-3276. A fallback secret named FIREBASE_SERVICE_ACCOUNT is also supported."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install function dependencies
        run: npm --prefix functions install

      - name: Validate business details
        run: npm run validate-business-details

      - name: Verify generated site and SEO
        run: npm run verify:seo

      - name: Authenticate Firebase service account
        shell: bash
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: Deploy Firebase Hosting, Functions, Firestore, and Extensions
        run: npx -y firebase-tools@latest deploy --only hosting,functions,firestore,extensions --project wasteremoval-3276 --non-interactive
